databases:
  - name: nurturing-db
    databaseName: nurturing
    plan: free

services:
  # API (Node/Express)
  - type: web
    name: nurturing-api
    runtime: node
    plan: free
    buildCommand: yarn install --frozen-lockfile && yarn workspace @nurturing/api prisma:generate && yarn build:api
    startCommand: yarn workspace @nurturing/api migrate:deploy
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_MODE
        value: clerk
      - key: DATABASE_URL
        fromDatabase:
          name: nurturing-db
          property: connectionString
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

  # Web (React/Vite — static site)
  - type: web
    name: nurturing-web
    runtime: static
    buildCommand: yarn install --frozen-lockfile && yarn build:web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_AUTH_MODE
        value: clerk
      - key: VITE_API_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
